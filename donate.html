<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate — Antigravity Monitor</title>
    <meta name="description" content="Support the Antigravity Monitor project.">
    <meta name="theme-color" content="#0a0e17">
    <link rel="canonical" href="https://nextcortex.github.io/donate.html">
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="apple-touch-icon" href="assets/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e17;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px;
        }

        .card {
            max-width: 520px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 56px 40px;
            backdrop-filter: blur(12px);
        }

        .icon {
            width: 120px;
            height: 120px;
            margin-bottom: 32px;
            opacity: 0.9;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #4f8fff, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 24px;
            font-size: 1.05rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e2e8f0;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
        }

        .heart {
            font-size: 2.5rem;
            margin-top: 32px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1><span class="gradient-text">Thank you</span> for thinking of us</h1>
        <p>We're not accepting donations at the moment. Antigravity Monitor is free, open source, and built with love.
        </p>
        <p>The best way to support us is by starring the project on GitHub and sharing it with others.</p>
        <a href="index.html" class="btn">← Back to home</a>
    </div>
</body>

</html>
